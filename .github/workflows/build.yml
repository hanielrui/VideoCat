name: Build for TrollStore ✅ FINAL
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild build \
            -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: PACK IPA ✅ CORRECT
        run: |
          APP=$(find build -name "*.app" | head -1)
          echo "Found: $APP"
          du -sh "$APP"

          mkdir -p Payload
          cp -R "$APP" Payload/
          
          # 🔥 这里修复！！！
          zip -ry VideoPlayer-TrollStore.ipa Payload

          ls -lh *.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-TrollStore-FINAL
          path: VideoPlayer-TrollStore.ipa
