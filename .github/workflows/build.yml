name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer
  CODE_SIGN_IDENTITY: ""
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift -version

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen version

      - name: Generate Xcode project with XcodeGen
        run: xcodegen generate --spec project.yml

      - name: Build iOS App
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=${{ env.CODE_SIGNING_ALLOWED }} \
            CODE_SIGNING_REQUIRED=${{ env.CODE_SIGNING_REQUIRED }} \
            CODE_SIGN_IDENTITY="${{ env.CODE_SIGN_IDENTITY }}"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            build/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 7

  archive:
    name: Create IPA
    runs-on: macos-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen version

      - name: Generate Xcode project with XcodeGen
        run: xcodegen generate --spec project.yml

      - name: Create IPA
        run: |
          # Create build directory
          mkdir -p ./build

          # Archive without signing for generic iOS device
          xcodebuild archive \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/VideoPlayer.xcarchive \
            CODE_SIGNING_ALLOWED=NO

          # Package .app into IPA manually using zip
          APP_PATH="./build/VideoPlayer.xcarchive/Products/Applications/VideoPlayer.app"
          IPA_PATH="./build/VideoPlayer.ipa"

          # Create Payload directory
          mkdir -p ./build/Payload
          cp -R "$APP_PATH" ./build/Payload/

          # Create IPA using zip
          cd ./build
          zip -qr "$IPA_PATH" Payload
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-ipa
          path: build/VideoPlayer.ipa

      - name: Upload xcarchive
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-xcarchive
          path: build/VideoPlayer.xcarchive
