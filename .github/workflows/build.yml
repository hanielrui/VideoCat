name: Final Build for TrollStore
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build App
        run: |
          xcodebuild build \
            -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -configuration Release \
            -destination generic/platform=iOS \
            CONFIGURATION_BUILD_DIR=./Products \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Make IPA
        run: |
          ls -la ./Products
          cp -R ./Products/VideoPlayer.app Payload/
          zip -ry VideoPlayer.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-TrollStore
          path: "*.ipa"
