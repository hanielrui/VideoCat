name: TrollStore IPA ✅ FINAL
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 🔥 唯一能导出完整 app 的方式：archive + 假签名
      - name: Archive
        run: |
          xcodebuild archive \
            -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath app.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO

      # 🔥 直接从 xcarchive 取 app（100% 存在）
      - name: Make IPA
        run: |
          APP="app.xcarchive/Products/Applications/VideoPlayer.app"
          
          ls -la "$APP"
          du -sh "$APP"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ry VideoPlayer-Troll.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Troll
          path: VideoPlayer-Troll.ipa
