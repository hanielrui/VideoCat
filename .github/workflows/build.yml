name: Build iOS ADHOC (No Account)
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: VideoPlayer
  SCHEME: VideoPlayer

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build with ADHOC Signing (REAL FULL IPA)
        run: |
          xcodebuild archive \
            -project "$PROJECT.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$PROJECT.xcarchive" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          APP="$PROJECT.xcarchive/Products/Applications/$PROJECT.app"
          ls -lh "$APP"
          du -sh "$APP"

          chmod +x "$APP/$PROJECT"
          rm -rf "$APP/_CodeSignature" "$APP/embedded.mobileprovision"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ryq "$PROJECT.ipa" Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-FINAL
          path: "*.ipa"
