name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    name: Build & Export Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: List project structure
        run: |
          echo "=== Root directory ==="
          ls -la
          echo ""
          echo "=== VideoPlayer directory ==="
          ls -la VideoPlayer/
          echo ""
          echo "=== Check if Swift files exist ==="
          find VideoPlayer -name "*.swift" | head -10

      - name: Show Build Settings
        run: |
          echo "=== Listing schemes ==="
          xcodebuild -project "${{ env.PROJECT_NAME }}.xcodeproj" -list
          echo ""
          echo "=== Key Build Settings ==="
          xcodebuild -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -showBuildSettings | grep -E "(SWIFT_VERSION|PRODUCT_NAME|TARGETED_DEVICE_FAMILY|INFOPLIST_FILE|ENABLE_PREVIEWS|ONLY_ACTIVE_ARCH|ARCHS|ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES)"

      - name: Build & Archive (No Signing)
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ALLOW_TARGETING_SIMULATOR=NO \
            SKIP_INSTALL=NO
          echo "Archive completed successfully"
        continue-on-error: true

      - name: Check build log for compilation errors
        run: |
          echo "=== Searching for Swift compilation in build log ==="
          grep -E "swiftc.*\.swift|CompileSwift|Compiling|Compiling .*.swift|error:|warning:" build.log | head -50 || echo "No compilation lines found"
          echo ""
          echo "=== Counting compiled Swift files ==="
          grep -c "swiftc.*\.swift" build.log || echo "0"
          echo ""
          echo "=== Searching for 'VideoPlayer.swift' in log ==="
          grep "VideoPlayer.swift" build.log || echo "Not found"
          echo ""
          echo "=== Last 100 lines of build log ==="
          tail -100 build.log

      - name: Debug Archive Contents
        run: |
          echo "=== Archive structure ==="
          find build/${{ env.PROJECT_NAME }}.xcarchive -type f | head -20
          echo ""
          echo "=== Check Applications directory ==="
          ls -la build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications/ 2>/dev/null || echo "Applications directory not found"
          echo ""
          echo "=== Check if app binary exists ==="
          if [ -d "build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications/${{ env.PROJECT_NAME }}.app" ]; then
            ls -la "build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications/${{ env.PROJECT_NAME }}.app/"
            find "build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications/${{ env.PROJECT_NAME }}.app" -type f -name "VideoPlayer" -exec ls -lh {} \;
          fi

      - name: Create IPA Manually
        run: |
          # 从 archive 中提取 .app
          APP_PATH="build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications/${{ env.PROJECT_NAME }}.app"

          # 检查 app 是否存在
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App not found at $APP_PATH"
            echo "Listing archive contents:"
            find build/${{ env.PROJECT_NAME }}.xcarchive -name "*.app" || true
            exit 1
          fi

          # 检查可执行文件是否存在
          BINARY_PATH="$APP_PATH/${{ env.PROJECT_NAME }}"
          if [ ! -f "$BINARY_PATH" ]; then
            echo "ERROR: Binary not found at $BINARY_PATH"
            echo "Contents of app directory:"
            ls -la "$APP_PATH"
            exit 1
          fi

          # 检查可执行文件大小
          BINARY_SIZE=$(stat -f%z "$BINARY_PATH" 2>/dev/null || stat -c%s "$BINARY_PATH" 2>/dev/null || echo "unknown")
          echo "Binary size: $BINARY_SIZE bytes"

          # 警告：如果二进制文件小于 1MB，可能有问题
          if [ "$BINARY_SIZE" -lt 1000000 ]; then
            echo "WARNING: Binary size is less than 1MB, which may indicate compilation issues"
          fi

          # 显示 app 大小
          echo "App size:"
          du -sh "$APP_PATH"

          # 创建 Payload 目录并复制 app
          mkdir -p build/Payload
          cp -R "$APP_PATH" "build/Payload/${{ env.PROJECT_NAME }}.app"

          # 手动创建 IPA（不使用 cd，直接指定路径）
          zip -r build/VideoPlayer-unsigned.ipa build/Payload/

          # 显示 IPA 大小
          echo "IPA size:"
          du -sh build/VideoPlayer-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Unsigned-IPA
          path: build/VideoPlayer-unsigned.ipa
          retention-days: 15
