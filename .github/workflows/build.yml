name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    name: Build & Export Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 1. 构建 Archive
      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      # 2. 自动查找 .app 并打包 IPA（永远不会找不到）
      - name: Create Unsigned IPA
        run: |
          # 自动查找 APP（核心修复）
          APP_PATH=$(find "${{ env.PROJECT_NAME }}.xcarchive" -name "*.app" -type d | head -1)
          echo "✅ 找到 APP: $APP_PATH"

          # 授权可执行
          chmod +x "$APP_PATH/${{ env.PROJECT_NAME }}"

          # 删除签名
          rm -rf "$APP_PATH/_CodeSignature"
          rm -f "$APP_PATH/embedded.mobileprovision"

          # 打包 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ryq VideoPlayer.ipa Payload

          echo "✅ IPA 生成成功！"
          ls -lh VideoPlayer.ipa

      # 3. 上传
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Unsigned-IPA
          path: VideoPlayer.ipa
          retention-days: 15
