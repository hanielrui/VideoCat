name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 归档 + 强制输出到 ./build （你总结的核心）
      - name: Archive
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "./build/VideoPlayer.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 2. 从固定路径取 app（100% 存在）
      - name: Package IPA
        run: |
          APP_PATH="./build/VideoPlayer.xcarchive/Products/Applications/${{ env.PROJECT_NAME }}.app"

          # 授权
          chmod +x "$APP_PATH/${{ env.PROJECT_NAME }}"
          
          # 清理签名
          rm -rf "$APP_PATH/_CodeSignature" "$APP_PATH/embedded.mobileprovision"
          
          # 打包
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ryq VideoPlayer.ipa Payload

          ls -lh VideoPlayer.ipa

      # 3. 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Final-IPA
          path: VideoPlayer.ipa
