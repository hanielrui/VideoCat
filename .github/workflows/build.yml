name: FINAL WORKING — iOS TrollStore
on:
  workflow_dispatch
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # 编译：强制输出真机完整产物
      - name: Build iOS Binary
        run: xcodebuild build \
          -project VideoPlayer.xcodeproj \
          -scheme VideoPlayer \
          -configuration Release \
          -sdk iphoneos \
          -arch arm64 \
          BUILD_DIR="./build" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

      # 关键：从真实路径打包，修复空包问题
      - name: Build Final IPA
        run: |
          APP="./build/Release-iphoneos/VideoPlayer.app"
          ls -la "$APP"
          du -sh "$APP"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ry VideoPlayer-Troll.ipa Payload
          ls -lh *.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-TrollStore
          path: "*.ipa"
