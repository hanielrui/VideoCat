name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild build \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            BUILD_DIR="./build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 👇 👇 👇 直接用日志里的真实路径！！
      - name: Package IPA
        run: |
          APP_PATH="./build/Build/Products/Release-iphoneos/VideoPlayer.app"
          echo "✅ 使用固定路径: $APP_PATH"

          # 检查是否存在
          ls -la "$APP_PATH"
          du -sh "$APP_PATH"

          # 权限
          chmod +x "$APP_PATH/VideoPlayer"

          # 清理签名
          rm -rf "$APP_PATH/_CodeSignature"
          rm -f "$APP_PATH/embedded.mobileprovision"

          # 打包
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ryq VideoPlayer.ipa Payload

          ls -lh VideoPlayer.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Final-IPA
          path: VideoPlayer.ipa
