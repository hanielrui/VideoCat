name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    name: Build & Export Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 1. 构建 Archive（已经100%成功）
      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      # 2. 生成无证书IPA（核心！）
      - name: Create Unsigned IPA
        run: |
          # 路径
          APP="build/VideoPlayer.xcarchive/Products/Applications/VideoPlayer.app"
          IPA="build/VideoPlayer.ipa"

          # 授权可执行（必须）
          chmod +x "$APP/VideoPlayer"

          # 删除签名（必须）
          rm -rf "$APP/_CodeSignature"
          rm -f "$APP/embedded.mobileprovision"

          # 标准IPA结构打包
          cd build
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ryq VideoPlayer.ipa Payload
          cd ..

          echo "✅ IPA 生成完成！"
          ls -lh build/VideoPlayer.ipa

      # 3. 上传IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Unsigned-IPA
          path: build/VideoPlayer.ipa
          retention-days: 15
