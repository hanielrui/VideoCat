name: Build for TrollStore
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive
        run: |
          xcodebuild archive \
            -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -destination 'generic/platform=iOS' \
            -archivePath VideoPlayer.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Pack IPA
        run: |
          APP_PATH="VideoPlayer.xcarchive/Products/Applications/VideoPlayer.app"

          ls -lh "$APP_PATH"
          du -sh "$APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry VideoPlayer-Troll.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-TrollStore
          path: "*.ipa"
