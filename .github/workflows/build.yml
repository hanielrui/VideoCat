name: Final iOS TrollStore
on:
  workflow_dispatch
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build
        run: xcodebuild build \
          -project VideoPlayer.xcodoproj \
          -scheme VideoPlayer \
          -configuration Release \
          -sdk iphoneos \
          -arch arm64 \
          BUILD_DIR=./build \
          CODE_SIGNING_ALLOWED=NO

      - name: Pack IPA
        run: |
          APP=$(find ./build -name "VideoPlayer.app" -type d | head -1)
          echo "Found: $APP"
          du -sh "$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ry VideoPlayer.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Troll
          path: "*.ipa"
