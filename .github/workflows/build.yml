name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 👇 强制输出产物到当前目录！！！
      - name: Build Release
        run: |
          xcodebuild build \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            BUILD_DIR="./build" \
            BUILD_ROOT="./build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 👇 从 ./build 搜索，100% 找到！
      - name: Find & Pack IPA
        run: |
          APP_PATH=$(find ./build -name "*.app" -type d | head -1)
          echo "✅ 找到真实 App：$APP_PATH"

          # 检查大小
          du -sh "$APP_PATH"

          # 权限
          chmod +x "$APP_PATH/$PROJECT_NAME"

          # 清理签名
          rm -rf "$APP_PATH/_CodeSignature"
          rm -f "$APP_PATH/embedded.mobileprovision"

          # 打包 IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ryq VideoPlayer.ipa Payload

          ls -lh VideoPlayer.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Final-IPA
          path: VideoPlayer.ipa
