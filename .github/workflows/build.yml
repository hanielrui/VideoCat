name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer
  CODE_SIGN_IDENTITY: ""
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show Swift version
        run: swift -version

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen version

      - name: Generate Xcode project with XcodeGen
        run: xcodegen generate --spec project.yml

      - name: Build iOS App
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=${{ env.CODE_SIGNING_ALLOWED }} \
            CODE_SIGNING_REQUIRED=${{ env.CODE_SIGNING_REQUIRED }} \
            CODE_SIGN_IDENTITY="${{ env.CODE_SIGN_IDENTITY }}"

      - name: Verify build output
        run: |
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Build output not found!"
            exit 1
          fi
          echo "Build successful: $APP_PATH"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            /Users/runner/Library/Developer/Xcode/DerivedData/VideoPlayer-*/Build/Products/Debug-iphonesimulator/*.app
          retention-days: 7
          if-no-files-found: error

  archive:
    name: Create Simulator IPA
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen version

      - name: Generate Xcode project with XcodeGen
        run: xcodegen generate --spec project.yml

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA
        run: |
          # Find the built .app file
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          # Create IPA
          mkdir -p ./build/Payload
          cp -R "$APP_PATH" ./build/Payload/
          cd ./build
          zip -qr VideoPlayer-Simulator.ipa Payload
          cd ..

          echo "IPA created at: ./build/VideoPlayer-Simulator.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Simulator-IPA
          path: build/VideoPlayer-Simulator.ipa
          retention-days: 7
