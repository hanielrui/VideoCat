name: TrollStore 正式可用版
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 🔥 只编译，不签名，不归档
      - name: Build Release
        run: |
          xcodebuild build \
            -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR=./output \
            CODE_SIGNING_ALLOWED=NO

      # 🔥 直接从 ./output 取 .app，100% 存在
      - name: 打包 IPA
        run: |
          APP="./output/VideoPlayer.app"
          ls -la "$APP"
          du -sh "$APP"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ry VideoPlayer-Troll.ipa Payload

          ls -lh *.ipa

      # 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-TrollStore
          path: VideoPlayer-Troll.ipa
