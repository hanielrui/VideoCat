name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    name: Build & Export Unsigned IPA
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build & Archive (No Signing)
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/${{ env.PROJECT_NAME }}.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ALLOW_TARGETING_SIMULATOR=NO \
            SKIP_INSTALL=NO

      - name: Create IPA Manually
        run: |
          # 从 archive 中提取 .app
          APP_NAME=$(find build/${{ env.PROJECT_NAME }}.xcarchive/Products/Applications -name "*.app" | head -1)
          APP_BASENAME=$(basename "$APP_NAME")

          # 创建 Payload 目录并复制 app
          mkdir -p build/Payload
          cp -R "$APP_NAME" "build/Payload/$APP_BASENAME"

          # 手动创建 IPA
          cd build
          zip -r VideoPlayer-unsigned.ipa Payload
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Unsigned-IPA
          path: build/VideoPlayer-unsigned.ipa
          retention-days: 15
