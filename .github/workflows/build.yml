name: Build iOS ADHOC (No Account)
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: VideoPlayer
  SCHEME: VideoPlayer

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build with ADHOC Signing (REAL FULL IPA)
        run: |
          xcodebuild archive \
            -project "$PROJECT.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$PROJECT.xcarchive" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          APP="$PROJECT.xcarchive/Products/Applications/$PROJECT.app"
          ls -lh "$APP"
          du -sh "$APP"

          # 手动复制 Swift 标准库（关键！）
          /Applications/Xcode_15.4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift-stdlib-tool --copy --verbose --scan-executable "$APP/$PROJECT" --scan-folder "$APP/Frameworks" --platform iphoneos --destination "$APP/Frameworks"

          # 检查是否成功复制
          echo "=== Frameworks 目录内容 ==="
          ls -la "$APP/Frameworks"

          chmod +x "$APP/$PROJECT"
          rm -rf "$APP/_CodeSignature" "$APP/embedded.mobileprovision"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ryq "$PROJECT.ipa" Payload

          # 显示最终 IPA 大小
          ls -lh "$PROJECT.ipa"
          unzip -l "$PROJECT.ipa"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-FINAL
          path: "*.ipa"
