name: Build iOS FOR TROLLSTORE ✅ FINAL
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: VideoPlayer
  SCHEME: VideoPlayer

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # 🔥 唯一不报错写法：完全关闭签名，不使用任何 adhoc / 假签
      - name: Archive Without Signing ✅ WORKS
        run: |
          xcodebuild archive \
            -project "$PROJECT.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$PROJECT.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      # 🔥 保留你完整的打包逻辑（复制Swift库、权限、打包）
      - name: Package IPA
        run: |
          APP="$PROJECT.xcarchive/Products/Applications/$PROJECT.app"
          ls -lh "$APP"
          du -sh "$APP"

          # 手动复制Swift库（你原来的逻辑）
          /Applications/Xcode_15.4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift-stdlib-tool --copy --verbose --scan-executable "$APP/$PROJECT" --scan-folder "$APP/Frameworks" --platform iphoneos --destination "$APP/Frameworks"
          
          chmod +x "$APP/$PROJECT"
          rm -rf "$APP/_CodeSignature" "$APP/embedded.mobileprovision"

          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -ryq "$PROJECT.ipa" Payload

          ls -lh "$PROJECT.ipa"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-FINAL
          path: "*.ipa"
