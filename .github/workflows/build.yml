name: FINAL FIX — Frameworks Included
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT: VideoPlayer
  SCHEME: VideoPlayer

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build App
        run: |
          xcodebuild build \
            -project "$PROJECT.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            BUILD_DIR="./build" \
            CODE_SIGNING_ALLOWED=NO

      - name: Add Swift Frameworks & Package IPA
        run: |
          APP="./build/Release-iphoneos/$PROJECT.app"
          echo "App path: $APP"

          # 关键步骤：强制复制 Swift 标准库到 Frameworks 目录
          mkdir -p "$APP/Frameworks"
          /Applications/Xcode_15.4.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift-stdlib-tool \
            --copy \
            --scan-executable "$APP/$PROJECT" \
            --platform iphoneos \
            --destination "$APP/Frameworks"

          # 给可执行文件加执行权限
          chmod +x "$APP/$PROJECT"

          # 打包 IPA
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r "$PROJECT-Troll.ipa" Payload

          # 检查最终大小
          ls -lh *.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: $PROJECT-Troll
          path: "*.ipa"
