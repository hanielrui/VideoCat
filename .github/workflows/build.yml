name: Build VideoCat (影视猫)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build iOS App
        run: |
          xcodebuild build -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ~/Library/Developer/Xcode/DerivedData/Build/Products/Release-iphoneos/*.app Payload/
          zip -9 -r VideoCat.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoCat-iPA
          path: VideoCat.ipa
