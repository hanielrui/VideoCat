name: ✅ FINAL: iOS for TrollStore
on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Use Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # 1. 先正常编译（生成二进制文件）
      - name: Compile Swift
        run: |
          xcodebuild build \
            -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CONFIGURATION_BUILD_DIR=./build \
            CODE_SIGNING_ALLOWED=NO

      # 2. 强制把二进制复制进 .app（核心修复！）
      - name: Fix Empty App
        run: |
          APP_DIR="./build/VideoPlayer.app"
          BINARY="./build/VideoPlayer"

          # 把真的二进制复制进去！
          cp -f "$BINARY" "$APP_DIR/"
          chmod +x "$APP_DIR/VideoPlayer"

          du -sh "$APP_DIR"

      # 3. 打包 IPA
      - name: Make TrollStore IPA
        run: |
          mkdir -p Payload
          cp -R ./build/VideoPlayer.app Payload/
          zip -ry VideoPlayer-Troll.ipa Payload
          ls -lh *.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-TrollStore-FINAL
          path: "*.ipa"
