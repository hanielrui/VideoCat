name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release (Real Build)
        run: |
          xcodebuild build \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find & Pack IPA
        run: |
          # 自动搜索真实的 .app（100% 存在）
          APP_PATH=$(find build -name "*.app" -type d | head -1)
          echo "✅ 找到真实App：$APP_PATH"

          # 授权
          chmod +x "$APP_PATH/${{ env.PROJECT_NAME }}"

          # 清理签名
          rm -rf "$APP_PATH/_CodeSignature"
          rm -f "$APP_PATH/embedded.mobileprovision"

          # 打包正确IPA结构
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ryq VideoPlayer.ipa Payload

          # 显示大小
          ls -lh VideoPlayer.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Final-IPA
          path: VideoPlayer.ipa
