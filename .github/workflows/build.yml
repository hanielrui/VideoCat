name: Build for TrollStore (Full IPA)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 直接编译真机二进制（完整包，不会空）
      - name: Build Release
        run: |
          xcodebuild build \
            -project VideoPlayer.xcodeproj \
            -scheme VideoPlayer \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      # 2. 从真实路径打包（巨魔专用结构）
      - name: Package TrollStore IPA
        run: |
          # 真实路径，从 derivedData 取完整 App
          APP_PATH=$(find build -name "VideoPlayer.app" -type d | head -1)
          echo "✅ 完整App路径：$APP_PATH"
          du -sh "$APP_PATH"

          # 打包 IPA（巨魔只认这个结构）
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry VideoPlayer-Troll.ipa Payload

          ls -lh VideoPlayer-Troll.ipa

      # 3. 上传最终可用包
      - name: Upload TrollStore IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-TrollStore
          path: VideoPlayer-Troll.ipa
