name: Build iOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-device:
    name: Build for iOS Device (真机)
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen version

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build for iOS Device (No Signing)
        run: |
          xcodebuild build \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create Unsigned IPA
        run: |
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          mkdir -p ./build/Payload
          cp -R "$APP_PATH" ./build/Payload/
          cd ./build && zip -qr VideoPlayer-Device-Unsigned.ipa Payload && cd ..
          echo "Unsigned IPA created"

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Device-Unsigned
          path: build/VideoPlayer-Device-Unsigned.ipa
          retention-days: 7

  build-signed:
    name: Build Signed IPA (需要证书)
    runs-on: macos-latest
    # 只有在配置了证书密钥时才运行
    if: false  # 默认禁用，需要证书时改为 true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen version

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Import Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时钥匙串
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          
          # 导入证书
          echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          
          # 导入描述文件
          echo $BUILD_PROVISION_PROFILE_BASE64 | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Signed IPA
        run: |
          xcodebuild -workspace ${{ env.PROJECT_NAME }}.xcworkspace \
            -scheme ${{ env.SCHEME_NAME }} \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/${{ env.SCHEME_NAME }}.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath build/${{ env.SCHEME_NAME }}.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build

      - name: Upload Signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Signed-IPA
          path: build/${{ env.SCHEME_NAME }}.ipa
          retention-days: 7