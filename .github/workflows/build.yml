name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild build \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 👇 👇 👇 全局搜索 .app —— 永远不会找不到
      - name: Find App And Package IPA
        run: |
          echo "🔍 全局搜索 .app..."
          APP_PATH=$(find /Users/runner -name "*.app" -type d | grep -i "Release-iphoneos" | head -1)
          
          echo "✅ 找到APP: $APP_PATH"
          ls -la "$APP_PATH"
          du -sh "$APP_PATH"

          chmod +x "$APP_PATH/${{ env.PROJECT_NAME }}"
          rm -rf "$APP_PATH/_CodeSignature" "$APP_PATH/embedded.mobileprovision"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ryq VideoPlayer.ipa Payload

          ls -lh VideoPlayer.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Final-IPA
          path: VideoPlayer.ipa
