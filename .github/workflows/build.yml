name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME: VideoPlayer

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS (Real Build, Not Archive)
        run: |
          xcodebuild build \
            -project "$PROJECT_NAME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath derivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED="NO" \
            CODE_SIGNING_ALLOWED="NO"

      # 👇 这里 100% 能拿到真实的、完整大小的 .app
      - name: Package IPA
        run: |
          APP_PATH=$(find derivedData -name "*.app" -type d | head -1)
          echo "✅ Found: $APP_PATH"

          # 赋予执行权限
          chmod +x "$APP_PATH/$PROJECT_NAME"

          # 清理签名
          rm -rf "$APP_PATH/_CodeSignature" "$APP_PATH/embedded.mobileprovision"

          # 打包正确的 IPA 结构
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ryq VideoPlayer.ipa Payload

          ls -lh VideoPlayer.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Final-IPA
          path: VideoPlayer.ipa
