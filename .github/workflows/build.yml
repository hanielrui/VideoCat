name: Build iOS (No Code Signing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: VideoPlayer
  SCHEME_NAME: VideoPlayer

jobs:
  build-ipa:
    name: Build & Export Unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 🔥 关键：强制把产物输出到当前目录
      - name: Build & Archive (Forced Output)
        run: |
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.SCHEME_NAME }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "./VideoPlayer.xcarchive" \
            -derivedDataPath "./derivedData" \
            BUILD_DIR="./build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      # 🔥 自动找真正的 .app（绝对不会空）
      - name: Find and Package IPA
        run: |
          # 从构建目录搜索真正的 .app（这是真实产物）
          APP_PATH=$(find ./derivedData -name "*.app" -type d | head -1)
          echo "✅ 找到真实 App: $APP_PATH"

          # 检查大小
          du -sh "$APP_PATH"

          # 权限
          chmod +x "$APP_PATH/VideoPlayer"

          # 清理签名
          rm -rf "$APP_PATH/_CodeSignature"
          rm -f "$APP_PATH/embedded.mobileprovision"

          # 打包
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -ry VideoPlayer.ipa Payload

          ls -lh VideoPlayer.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VideoPlayer-Final-IPA
          path: VideoPlayer.ipa
          retention-days: 15
